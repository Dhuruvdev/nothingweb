kind = "web"
previewPath = "/"
title = "Helio AI Landing Page"
version = "1.0.0"
id = "artifacts/helio-landing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21908

[services.development]
run = "pnpm --filter @workspace/helio-landing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/helio-landing", "run", "build" ]
publicDir = "artifacts/helio-landing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21908"
BASE_PATH = "/"
